<!DOCTYPE html>
<html lang="en">

<head>
    <title>Prototype 3</title>
    <!-- p5 -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1.1.9/lib/p5.js"></script>
    <!-- ml5 -->
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #form-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        form {
            padding: 20px;
            background: rgb(238, 238, 238);
        }

        input, label {
            margin: 10px 0px 10px 0px;
        }
    </style>
</head>

<body>
    <div id="form-container">
        <form id="form">
            <label for="artist">Artist:</label><br>
            <input type="text" id="artist" name="artist" value="Ray Charles" required><br>
            <label for="track">Track:</label><br>
            <input type="text" id="track" name="track" value="Hit the Road Jack" required><br><br>
            <input type="submit" value="Submit!">
        </form>
    </div>
    <script src="prototype3.js"></script>
</body>

</html>
